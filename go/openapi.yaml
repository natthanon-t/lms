openapi: 3.0.3
info:
  title: CBT LMS Backend API
  version: 1.1.0
  description: OpenAPI spec generated from current Go Fiber backend routes.
servers:
  - url: http://localhost:5020
tags:
  - name: Health
  - name: Auth
  - name: Profile
  - name: Admin Users
  - name: Admin Exams
  - name: Courses
  - name: Learning
  - name: Exams
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Register success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          description: Invalid credentials or inactive account
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          description: Invalid refresh token or inactive account
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh token if provided)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: logout success
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile from access token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPayload"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /api/auth/login-dates:
    get:
      tags: [Auth]
      summary: Get login dates for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Login dates
          content:
            application/json:
              schema:
                type: object
                properties:
                  dates:
                    type: array
                    items:
                      type: string
                      format: date
                      example: "2026-03-01"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/profile:
    patch:
      tags: [Profile]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: profile updated
                  user:
                    $ref: "#/components/schemas/UserPayload"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/profile/change-password:
    post:
      tags: [Profile]
      summary: Change current user password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: password changed
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/profile/avatar:
    get:
      tags: [Profile]
      summary: Get current user avatar
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Avatar data URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_url:
                    type: string
                    description: Base64-encoded data URL (e.g. data:image/png;base64,...)
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [Profile]
      summary: Update current user avatar (max 2 MB base64)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarRequest"
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: avatar updated
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "413":
          description: Avatar data URL exceeds 2 MB limit
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/role:
    get:
      tags: [Admin Users]
      summary: Get available user roles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Role options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleOptionsResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /api/users:
    get:
      tags: [Admin Users]
      summary: List users with pagination (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuthUser"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Admin Users]
      summary: Create user (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: create user success
                  user:
                    $ref: "#/components/schemas/AuthUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/users/options:
    get:
      tags: [Admin Users]
      summary: Get available role and status options for user management (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Role and status options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserManagementOptionsResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"

  /api/users/{username}:
    patch:
      tags: [Admin Users]
      summary: Update user by username (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: update user success
                  user:
                    $ref: "#/components/schemas/UserPayload"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/users/{username}/reset-password:
    post:
      tags: [Admin Users]
      summary: Reset user password by username (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminResetPasswordRequest"
      responses:
        "200":
          description: Password reset success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: reset password success
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/admin/exam-attempts:
    get:
      tags: [Admin Exams]
      summary: List all exam attempts across all users with pagination (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: All exam attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempts:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminExamAttempt"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/admin/exam-attempts/{id}:
    get:
      tags: [Admin Exams]
      summary: Get per-question details for a single exam attempt (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Attempt detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  details:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExamAttemptAnswer"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/courses:
    get:
      tags: [Courses]
      summary: List courses with pagination (public)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Courses list
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      $ref: "#/components/schemas/Course"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Courses]
      summary: Create or update a course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertCourseRequest"
      responses:
        "200":
          description: Course saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  course:
                    $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/courses/{id}:
    delete:
      tags: [Courses]
      summary: Delete a course
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: course deleted
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/courses/{id}/status:
    patch:
      tags: [Courses]
      summary: Update course status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: status updated
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/courses/{id}/images:
    get:
      tags: [Courses]
      summary: Get all content images for a course (public)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course images
          content:
            application/json:
              schema:
                type: object
                properties:
                  images:
                    type: object
                    additionalProperties:
                      type: string
                      description: Base64 data URL keyed by filename
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Courses]
      summary: Save a content image for a course
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseImageRequest"
      responses:
        "200":
          description: Image saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: image saved
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/learning/progress:
    get:
      tags: [Learning]
      summary: Get learning progress for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Learning progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  progress:
                    type: object
                    description: Progress keyed by course ID
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/learning/scores:
    get:
      tags: [Learning]
      summary: Get total and skill scores for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User scores
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  skills:
                    type: object
                    additionalProperties:
                      type: integer
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/learning/leaderboard:
    get:
      tags: [Learning]
      summary: Get leaderboard
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaderboard:
                    type: array
                    items:
                      type: object
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/learning/courses/{courseId}/subtopics/{subtopicId}/complete:
    post:
      tags: [Learning]
      summary: Mark a subtopic as complete
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: subtopicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Subtopic marked complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: subtopic marked complete
                  awarded_score:
                    type: integer
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/learning/courses/{courseId}/subtopics/{subtopicId}/answer:
    post:
      tags: [Learning]
      summary: Submit a subtopic answer
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
        - name: subtopicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubtopicAnswerRequest"
      responses:
        "200":
          description: Answer saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: answer saved
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/learning/courses/{courseId}/complete:
    post:
      tags: [Learning]
      summary: Mark a course as complete and award completion score
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: course completed
                  awarded_score:
                    type: integer
                  skill_rewards:
                    type: array
                    items:
                      $ref: "#/components/schemas/SkillReward"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/exams:
    get:
      tags: [Exams]
      summary: List exams with pagination (public)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Exams list
          content:
            application/json:
              schema:
                type: object
                properties:
                  exams:
                    type: array
                    items:
                      $ref: "#/components/schemas/Exam"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Exams]
      summary: Create or update an exam
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertExamRequest"
      responses:
        "200":
          description: Exam saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  exam:
                    $ref: "#/components/schemas/Exam"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/exams/{id}:
    get:
      tags: [Exams]
      summary: Get exam detail with questions (public)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exam detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  exam:
                    $ref: "#/components/schemas/ExamDetail"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Exams]
      summary: Delete an exam
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exam deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: exam deleted
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/exams/{id}/status:
    patch:
      tags: [Exams]
      summary: Update exam status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: status updated
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/exams/{id}/attempts:
    get:
      tags: [Exams]
      summary: Get exam attempts for current user
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attempts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempts:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExamAttempt"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Exams]
      summary: Save exam attempt result
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveAttemptRequest"
      responses:
        "200":
          description: Attempt saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempt:
                    $ref: "#/components/schemas/ExamAttempt"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (starts at 1)
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page (max 100)

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]
      example:
        message: invalid request body

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items
          example: 87
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Items per page
          example: 20
        total_pages:
          type: integer
          description: Total number of pages
          example: 5
      required: [total, page, limit, total_pages]

    UserPayload:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: System Admin
        username:
          type: string
          example: admin
        role:
          type: string
          example: admin
        status:
          type: string
          example: active
      required: [id, name, username, role, status]

    AuthUser:
      allOf:
        - $ref: "#/components/schemas/UserPayload"
        - type: object
          properties:
            employee_code:
              type: string
              example: ABCD-01-1234
            created_at:
              type: string
              format: date-time
              example: "2026-02-27T03:00:00Z"
          required: [created_at]

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        username:
          type: string
        employee_code:
          type: string
          description: Format XXXX-XX-XXXX (optional)
        password:
          type: string
          minLength: 8
      required: [name, username, password]

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: register success
        user:
          $ref: "#/components/schemas/AuthUser"
      required: [message, user]

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    AuthTokenResponse:
      type: object
      properties:
        message:
          type: string
          example: login success
        token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Access token lifetime in seconds
          example: 900
        user:
          $ref: "#/components/schemas/UserPayload"
      required: [message, token, refresh_token, token_type, expires_in, user]

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        employee_code:
          type: string
          description: Format XXXX-XX-XXXX (optional)
      required: []

    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
        new_password:
          type: string
          minLength: 8
      required: [current_password, new_password]

    AvatarRequest:
      type: object
      properties:
        data_url:
          type: string
          description: Base64-encoded data URL (max 2 MB)
      required: [data_url]

    AdminCreateUserRequest:
      type: object
      properties:
        name:
          type: string
        username:
          type: string
        employee_code:
          type: string
          description: Format XXXX-XX-XXXX
        password:
          type: string
          minLength: 8
        role:
          type: string
          description: Defaults to ผู้ใช้งาน when omitted
          enum: ["ผู้ใช้งาน", "ผู้สอน", "ผู้ดูแลระบบ", "user", "admin"]
        status:
          type: string
          enum: [active, inactive]
          description: Defaults to active when omitted
      required: [name, username, employee_code, password]

    AdminUpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        employee_code:
          type: string
          description: Format XXXX-XX-XXXX
        role:
          type: string
          enum: ["ผู้ใช้งาน", "ผู้สอน", "ผู้ดูแลระบบ", "user", "admin"]
        status:
          type: string
          enum: [active, inactive]

    UserManagementOptionsResponse:
      type: object
      properties:
        role_options:
          type: array
          items:
            type: string
            enum: ["ผู้ใช้งาน", "ผู้สอน", "ผู้ดูแลระบบ", "user", "admin"]
        status_options:
          type: array
          items:
            type: string
            enum: [active, inactive]
        default_role:
          type: string
          enum: ["ผู้ใช้งาน", "ผู้สอน", "ผู้ดูแลระบบ", "user", "admin"]
          example: "ผู้ใช้งาน"
        default_status:
          type: string
          enum: [active, inactive]
          example: active
      required: [role_options, status_options, default_role, default_status]

    RoleOptionsResponse:
      type: object
      properties:
        roles:
          type: array
          items:
            type: string
            enum: ["ผู้ใช้งาน", "ผู้สอน", "ผู้ดูแลระบบ", "user", "admin"]
        default_role:
          type: string
          enum: ["ผู้ใช้งาน", "ผู้สอน", "ผู้ดูแลระบบ", "user", "admin"]
          example: "ผู้ใช้งาน"
      required: [roles, default_role]

    AdminResetPasswordRequest:
      type: object
      properties:
        new_password:
          type: string
          minLength: 8
      required: [new_password]

    AdminExamAttempt:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        user_name:
          type: string
        employee_code:
          type: string
        exam_id:
          type: string
        exam_title:
          type: string
        correct_count:
          type: integer
        total_questions:
          type: integer
        score_percent:
          type: number
          format: float
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
      required: [id, username, exam_id, correct_count, total_questions, score_percent, started_at]

    StatusRequest:
      type: object
      properties:
        status:
          type: string
          enum: [active, inprogress, inactive]
      required: [status]

    SkillReward:
      type: object
      properties:
        skill:
          type: string
        points:
          type: integer
      required: [skill, points]

    Course:
      type: object
      properties:
        id:
          type: string
          example: course-123
        title:
          type: string
        creator:
          type: string
        owner_username:
          type: string
        status:
          type: string
          enum: [active, inprogress, inactive]
        description:
          type: string
        image:
          type: string
        content:
          type: string
          description: Markdown content
        skill_points:
          type: integer
        subtopic_completion_score:
          type: integer
        course_completion_score:
          type: integer
        created_at:
          type: string
          format: date-time
        skill_rewards:
          type: array
          items:
            $ref: "#/components/schemas/SkillReward"
      required: [id, title, status]

    UpsertCourseRequest:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        creator:
          type: string
        status:
          type: string
          enum: [active, inprogress, inactive]
        description:
          type: string
        image:
          type: string
        content:
          type: string
        skill_points:
          type: integer
        subtopic_completion_score:
          type: integer
        course_completion_score:
          type: integer
        skill_rewards:
          type: array
          items:
            $ref: "#/components/schemas/SkillReward"
      required: [id, title]

    CourseImageRequest:
      type: object
      properties:
        filename:
          type: string
        data_url:
          type: string
          description: Base64-encoded data URL
      required: [filename, data_url]

    SubtopicAnswerRequest:
      type: object
      properties:
        question_id:
          type: string
        typed_answer:
          type: string
        is_correct:
          type: boolean
      required: [question_id]

    ExamQuestion:
      type: object
      properties:
        id:
          type: string
        exam_id:
          type: string
        domain:
          type: string
        question_type:
          type: string
          enum: [multiple_choice, text]
        question:
          type: string
        choices:
          type: array
          items:
            type: string
          minItems: 4
          maxItems: 4
        answer_key:
          type: string
        explanation:
          type: string
      required: [id, question, choices, answer_key]

    Exam:
      type: object
      description: Exam metadata (no questions)
      properties:
        id:
          type: string
          example: cc1
        title:
          type: string
        creator:
          type: string
        owner_username:
          type: string
        status:
          type: string
          enum: [active, inprogress, inactive]
        description:
          type: string
        instructions:
          type: string
        image:
          type: string
        number_of_questions:
          type: integer
        default_time:
          type: integer
          description: Duration in minutes
        max_attempts:
          type: integer
          description: 0 = unlimited
        created_at:
          type: string
          format: date-time
        domain_percentages:
          type: object
          additionalProperties:
            type: integer
          example:
            "Domain A": 60
            "Domain B": 40
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ExamQuestion"
      required: [id, title, status]

    ExamDetail:
      allOf:
        - $ref: "#/components/schemas/Exam"
        - type: object
          description: Exam with full question list

    UpsertExamRequest:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        creator:
          type: string
        status:
          type: string
          enum: [active, inprogress, inactive]
        description:
          type: string
        instructions:
          type: string
        image:
          type: string
        number_of_questions:
          type: integer
        default_time:
          type: integer
        max_attempts:
          type: integer
          description: 0 = unlimited
        domain_percentages:
          type: object
          additionalProperties:
            type: integer
        questions:
          type: array
          items:
            $ref: "#/components/schemas/ExamQuestion"
      required: [id, title]

    ExamDomainStat:
      type: object
      properties:
        correct:
          type: integer
        total:
          type: integer
      required: [correct, total]

    ExamAttemptAnswer:
      type: object
      properties:
        question_id:
          type: string
        domain:
          type: string
        question_type:
          type: string
          enum: [multiple_choice, text]
        question:
          type: string
        choices:
          type: array
          items:
            type: string
        answer_key:
          type: string
        explanation:
          type: string
        selected:
          type: string
        is_correct:
          type: boolean
          nullable: true
          description: null for text-type questions
      required: [question_id, selected]

    ExamAttempt:
      type: object
      properties:
        id:
          type: integer
          format: int64
        correct_count:
          type: integer
        total_questions:
          type: integer
        score_percent:
          type: number
          format: float
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
        domain_stats:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ExamDomainStat"
        details:
          type: array
          items:
            $ref: "#/components/schemas/ExamAttemptAnswer"
      required: [id, correct_count, total_questions, score_percent, started_at]

    SaveAttemptRequest:
      type: object
      properties:
        correct_count:
          type: integer
        total_questions:
          type: integer
        score_percent:
          type: number
          format: float
        domain_stats:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ExamDomainStat"
        answers:
          type: array
          items:
            type: object
            properties:
              question_id:
                type: string
              selected:
                type: string
              is_correct:
                type: boolean
                nullable: true
            required: [question_id, selected]
      required: [correct_count, total_questions, score_percent]
