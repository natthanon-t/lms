openapi: 3.0.3
info:
  title: CBT LMS Backend API
  version: 1.2.0
  description: OpenAPI spec generated from current Go Fiber backend routes.
servers:
  - url: http://localhost:5020
tags:
  - name: Health
  - name: Auth
  - name: Profile
  - name: Admin Users
  - name: Admin Exams
  - name: Courses
  - name: Learning
  - name: Exams
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Register success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          description: Invalid credentials or inactive account
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Refresh success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          description: Invalid refresh token or inactive account
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh token if provided)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Logout success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: logout success
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile from access token
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPayload"
        "401":
          $ref: "#/components/responses/ErrorResponse"

  /api/auth/login-dates:
    get:
      tags: [Auth]
      summary: Get login dates for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Login dates
          content:
            application/json:
              schema:
                type: object
                properties:
                  dates:
                    type: array
                    items:
                      type: string
                      format: date
                      example: "2026-03-01"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/auth/permissions:
    get:
      tags: [Auth]
      summary: Get permissions for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User permissions
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: boolean
                example:
                  user_manage: true
                  content_manage: false
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/profile:
    patch:
      tags: [Profile]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: profile updated
                  user:
                    $ref: "#/components/schemas/UserPayload"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/profile/change-password:
    post:
      tags: [Profile]
      summary: Change current user password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: password changed
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/profile/avatar:
    get:
      tags: [Profile]
      summary: Get current user avatar
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Avatar data URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  data_url:
                    type: string
                    description: Base64-encoded data URL (e.g. data:image/png;base64,...)
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [Profile]
      summary: Update current user avatar (max 2 MB base64)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvatarRequest"
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: avatar updated
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "413":
          description: Avatar data URL exceeds 2 MB limit
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/role:
    get:
      tags: [Admin Users]
      summary: Get available user roles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Role options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleOptionsResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Admin Users]
      summary: Create a new role (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  example: manager
                name:
                  type: string
                  example: Manager
              required: [code, name]
      responses:
        "201":
          description: Role created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: role created
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/role/{code}:
    patch:
      tags: [Admin Users]
      summary: Update role name (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: Role code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: New Manager Name
              required: [name]
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: role updated
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    delete:
      tags: [Admin Users]
      summary: Delete a role (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: Role code
      responses:
        "200":
          description: Role deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: role deleted
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/role/{code}/permissions:
    put:
      tags: [Admin Users]
      summary: Update permissions for a role (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: Role code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                permissions:
                  type: array
                  items:
                    type: string
                  example: [user_manage, content_manage]
              required: [permissions]
      responses:
        "200":
          description: Permissions updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: permissions updated
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/users:
    get:
      tags: [Admin Users]
      summary: List users with pagination (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Users list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuthUser"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Admin Users]
      summary: Create user (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: create user success
                  user:
                    $ref: "#/components/schemas/AuthUser"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/users/options:
    get:
      tags: [Admin Users]
      summary: Get available role and status options for user management (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Role and status options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserManagementOptionsResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"

  /api/users/default-password:
    get:
      tags: [Admin Users]
      summary: Get default reset password (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default password
          content:
            application/json:
              schema:
                type: object
                properties:
                  password:
                    type: string
                    example: defaultPassword123
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    put:
      tags: [Admin Users]
      summary: Update default reset password (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password:
                  type: string
                  example: newDefaultPassword456
              required: [password]
      responses:
        "200":
          description: Default password updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: default password updated
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/users/{username}:
    patch:
      tags: [Admin Users]
      summary: Update user by username (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: update user success
                  user:
                    $ref: "#/components/schemas/UserPayload"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/users/{username}/reset-password:
    post:
      tags: [Admin Users]
      summary: Reset user password by username (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminResetPasswordRequest"
      responses:
        "200":
          description: Password reset success
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: reset password success
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/users/{username}/profile:
    get:
      tags: [Profile]
      summary: Get public user profile information
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User public profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                  name:
                    type: string
                  avatar:
                    type: string
                    nullable: true
                  created_at:
                    type: string
                    format: date-time
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/admin/exam-attempts:
    get:
      tags: [Admin Exams]
      summary: List all exam attempts across all users with pagination (admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: All exam attempts
          content:
            application/json:
              schema:
                type: object
                properties:
                  attempts:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminExamAttempt"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/admin/exam-attempts/{id}:
    get:
      tags: [Admin Exams]
      summary: Get per-question details for a single exam attempt (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Attempt detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  details:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExamAttemptAnswer"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/admin/analytics:
    get:
      tags: [Admin Exams]
      summary: Get system analytics (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: System analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_users:
                    type: integer
                  total_courses:
                    type: integer
                  total_exams:
                    type: integer
                  total_exam_attempts:
                    type: integer
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/admin/analytics/courses/{courseId}/learners:
    get:
      tags: [Admin Exams]
      summary: Get learners for a specific course (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
          description: Course ID
      responses:
        "200":
          description: Course learners
          content:
            application/json:
              schema:
                type: object
                properties:
                  course_id:
                    type: string
                  learners:
                    type: array
                    items:
                      type: object
                      properties:
                        username:
                          type: string
                        name:
                          type: string
                        progress:
                          type: number
                          format: float
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/admin/analytics/course-stats:
    get:
      tags: [Admin Exams]
      summary: Get per-course stats for instructor view (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [my]
          description: "Filter to owned courses only (scope=my)"
      responses:
        "200":
          description: Course stats list
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      $ref: "#/components/schemas/CourseInstructorStats"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/admin/analytics/courses/{courseId}/detail:
    get:
      tags: [Admin Exams]
      summary: Get subtopic time and unanswered Q&A for a course (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: courseId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Course detail analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseDetailAnalytics"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/admin/analytics/exam-stats:
    get:
      tags: [Admin Exams]
      summary: Get per-exam stats for instructor view (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum: [my]
          description: "Filter to owned exams only (scope=my)"
      responses:
        "200":
          description: Exam stats list
          content:
            application/json:
              schema:
                type: object
                properties:
                  exams:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExamInstructorStats"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/admin/analytics/exams/{examId}/detail:
    get:
      tags: [Admin Exams]
      summary: Get domain avg scores and hard questions for an exam (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: examId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exam detail analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamDetailAnalytics"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  /api/courses:
    get:
      tags: [Courses]
      summary: List courses with pagination (public)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Courses list
          content:
            application/json:
              schema:
                type: object
                properties:
                  courses:
                    type: array
                    items:
                      $ref: "#/components/schemas/Course"
                  pagination:
                    $ref: "#/components/schemas/PaginationMeta"
        "500":
          $ref: "#/components/responses/ErrorResponse"
    post:
      tags: [Courses]
      summary: Create or update a course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertCourseRequest"
      responses:
        "200":
          description: Course saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  course:
                    $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
