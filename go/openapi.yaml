components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number (starts at 1)
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: Items per page (max 100)

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]
      example:
        message: invalid request body

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
          description: Total number of items
          example: 87
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Items per page
          example: 20
        total_pages:
          type: integer
          description: Total number of pages
          example: 5
      required: [total, page, limit, total_pages]

    UserPayload:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: System Admin
        username:
          type: string
          example: admin
        role:
          type: string
          example: admin
        status:
          type: string
          example: active
      required: [id, name, username, role, status]

    AuthUser:
      allOf:
        - $ref: "#/components/schemas/UserPayload"
        - type: object
          properties:
            employee_code:
              type: string
              example: ABCD-01-1234
            created_at:
              type: string
              format: date-time
              example: "2026-02-27T03:00:00Z"
          required: [created_at]

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        username:
          type: string
        employee_code:
          type: string
          description: Format XXXX-XX-XXXX (optional)
        password:
          type: string
          minLength: 8
      required: [name, username, password]

    RegisterResponse:
      type: object
      properties:
        message:
          type: string
          example: register success
        user:
          $ref: "#/components/schemas/AuthUser"
      required: [message, user]

    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
      required: [refresh_token]

    AuthTokenResponse:
      type: object
      properties:
        message:
          type: string
          example: login success
        token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Access token lifetime in seconds
          example: 900
        user:
          $ref: "#/components/schemas/UserPayload"
      required: [message, token, refresh_token, token_type, expires_in, user]

